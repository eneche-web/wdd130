<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="description"
      content="recreation that involves navigating a non-motorize watercraft down free flowing rivers">
    <meta name="author" content="Eneche John">
    <link rel="stylesheet" href="styles/rafting.css">
    <title>Contact Us | Silver Current River Rafting</title>
</head>

<body>
    <header>
        <nav>
            <img src="images/rafting-logo.png" alt="thrilling and safe experience" width="500">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Us</h1>
        <!...Company Information...>
            <section class="company-info">
                <h2>Company Information</h2>
                <p>Email:info@silvercurrentriverrafting.com</p>
                <p>Phone:+2348135692810</p>
                <p>Address:Lagos,Nigeria</p>

                <iframe src="https://www.google.com/maps/embed?pb=" width="600" height="450"
                  style="border: 0;" allowfullscreen="" loading="lazy">
                </iframe>
            </section>
            <!...employment Profile...>
                <section class="employees">
                    <h2>Meet Our Team</h2>

                    <figure>
                        <img scr="images/manager.webp" alt="Johnson Abel">
                        <figcaption>Johnson Abel-General Manager</figcaption>
                    </figure>

                    <figure>
                        <img src="images/guide.webp" alt="Jack Moor">
                        <figcaption>Jack Moor - Lead River Guide</figcaption>
                    </figure>

                    <figure>
                        <img src="images/customer-service.webp" alt="Alice Brown">
                        <figcaption>Alice Brown- Customer Service Manager</figcaption>
                    </figure>
                </section>

                <!...Contact Form...>
                    <section class="contact-form">
                        <h2>Send Us a Message</h2>

                        <form action="#" method="post">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" required>

                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" required>

                            <fieldset>
                                <legend>Purpose of Message</legend>
                                <label>
                                    <input type="radio" name="purpose" value="general"
                                      required>General Inquiry
                                </label>

                                <label>
                                    <input type="radio" name="purpose"
                                      value="reservation">Reservation Question
                                </label>

                                <label>
                                    <input type="radio" name="purpose" value="suggestion">Website
                                    Suggestion
                                </label>
                            </fieldset>

                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="5"></textarea>

                            <label>
                                <input type="checkbox" name="newsletter">please subscribe me to the
                                monthly newsletter
                            </label>

                            <button type="submit">Send Message</button>
                        </form>
                    </section>

    </main>
    <footer>
        <p>©2026 Silver Current River Rafting</p>
    </footer>
</body>

</html>
